name: 💡 Feature Request
description: Suggest a new feature or improvement
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We love hearing your ideas! Help us make WINNER12 better.
  
  - type: textarea
    id: feature-description
    attributes:
      label: Feature Description
      description: "What feature would you like to see?"
      placeholder: "I would like to see predictions for lower-tier leagues like Championship, League One, etc."
    validations:
      required: true
  
  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: "How would this feature help you?"
      placeholder: "I follow Championship closely and would love to have AI predictions for those matches to help with my betting strategy."
    validations:
      required: true
  
  - type: dropdown
    id: priority
    attributes:
      label: How important is this to you?
      options:
        - "Nice to have"
        - "Would be very useful"
        - "Critical for my use case"
  
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: "Have you considered any alternative solutions or workarounds?"
      placeholder: "Currently I use FiveThirtyEight for Championship, but they don't have AI predictions..."
  
  - type: markdown
    attributes:
      value: |
        ---
        **Thank you for your suggestion!** 🙏
        
        We review all feature requests and prioritize based on:
        - Community demand (upvotes on this issue)
        - Technical feasibility
        - Alignment with our roadmap
        
        Feel free to upvote existing feature requests or add your thoughts to ongoing discussions!
